<!doctype html>
<html lang="ar">
<head>
  <meta charset="utf-8">
  <title>لوحة التحكم</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <h2>لوحة التحكم</h2>
  <p>مرحباً، {{ session.username }}</p>
  <p><a href="{{ url_for('add_record') }}">إضافة سجل</a> | <a href="{{ url_for('logout') }}">خروج</a></p>
  <hr>
  {% for r in records %}
    <article>
      <h3>{{ r.title }}</h3>
      <p>{{ r.content }}</p>
      <small>{{ r.created_at }}</small>
    </article>
    <hr>
  {% else %}
    <p>لا توجد سجلات بعد.</p>
  {% endfor %}
</body>
</html>
